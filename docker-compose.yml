name: prism-ai

services:
  # --- Backend: FastAPI ---
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    container_name: prism-ai-backend
    restart: always
    environment:
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn scripts.backend:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models
      - ./backend/datasets:/app/datasets
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - prism-ai-network

  # --- Celery Worker: Background Task Runner ---
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    container_name: prism-ai-worker
    restart: always
    command: python -m celery -A scripts.celery_app worker --loglevel=info --concurrency=4
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models
      - ./backend/datasets:/app/datasets
      - ./backend/logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - prism-ai-network

  # --- MLOps: MLflow (Experiment Tracking) ---
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.1
    container_name: prism-ai-mlflow
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server 
      --backend-store-uri sqlite:///mlflow/mlflow.db 
      --default-artifact-root /mlflow/artifacts 
      --host 0.0.0.0
      --port 5000
    networks:
      - prism-ai-network

  # --- Cache: Redis (Optional for local dev, Upstash used for production) ---
  redis:
    image: redis:7-alpine
    container_name: prism-ai-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prism-ai-network

networks:
  prism-ai-network:
    name: prism-ai-network
    driver: bridge

volumes:
  redis-data:
    name: prism-ai-redis-data
    driver: local
  mlflow-data:
    name: prism-ai-mlflow-data
    driver: local
